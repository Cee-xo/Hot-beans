body {

  /* Grid container */
  .card-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 40px;
    padding: 40px;
    max-width: 1200px;
    margin: auto;
  }

  /* Card */
  .card {
    background: #4f8fc4;
    border-radius: 30px;
    padding: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.2s ease;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  /* Image */
  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 20px;
    margin-bottom: 15px;
  }

  /* Name */
  .card h3 {
    margin: 10px 0 5px;
  }

  .card p {
    margin: 0;
    font-size: 0.9rem;
    opacity: 0.9;
  }
