<link rel="stylesheet" href="./css/MAIN.css">

  <style>
   .banner {
      height: 40vh; /* 40% of screen height */
      background-image: url('./Images/banner3.png');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      font-family: 'gelasio' 
    }


 #box {
display:table;
width:100%;
}
.column {
display:table-cell;
width:55%;
background:#f3c8c8;
padding:0 20px;
} 
.two {
  display:table-cell;
background:#ffffff;
padding:0 20px;
 font-family: Arial, sans-serif;
    background: #ffffff;
    padding: 40px;
  }

  .form-container {
    max-width: 900px;
    margin: auto;
    background: #f5f5f5;
  }

  .row {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }

  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  label {
    margin-bottom: 6px;
    font-weight: 500;
  }

  input, textarea {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  textarea {
    resize: none;
    height: 120px;
  }

  .checkbox-group {
    display: flex;
    gap: 20px;
    margin: 10px 0 20px;
  }

  .checkbox-group label {
    font-weight: normal;
  }

  .single-checkbox {
    margin: 15px 0;
  }

  button {
    background: #0b2d3a;
    color: white;
    border: none;
    padding: 14px 30px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 16px;
  }

  button:hover {
    background: #094252;
  }

  .note {
    font-size: 12px;
    color: #666;
    margin-top: 15px;
  }

  @media (max-width: 768px) {
    .row {
      flex-direction: column;
    }
  }







  </style>
</head>
